<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Campus — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4faf8;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,128,96,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,128,96,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove { to { background-position: 40px 40px; } }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      pointer-events: none;
    }
    .orb1 { width: 400px; height: 400px; background: #e8441a; top: -120px; left: -120px; animation: float1 8s ease-in-out infinite; }
    .orb2 { width: 300px; height: 300px; background: #2d3acc; bottom: -80px; right: -80px; animation: float2 10s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

    .card {
      position: relative;
      z-index: 10;
      background: #ffffff;
      border: 1.5px solid #c8e8de;
      border-radius: 24px;
      padding: 50px 44px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(26,128,96,0.1), 0 4px 16px rgba(0,0,0,0.06);
      animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

    .logo-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1a8060, #2d3acc);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: #0f2d25; line-height: 1.2; }
    .logo-text span { display: block; font-weight: 400; font-size: 0.75rem; color: #4a8070; font-family: 'DM Sans', sans-serif; }

    h2 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: #0f2d25; margin-bottom: 6px; }
    .subtitle { font-size: 0.85rem; color: #4a8070; margin-bottom: 32px; }

    label { display: block; font-size: 0.78rem; font-weight: 500; color: #4a8070; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }

    .input-wrap { position: relative; margin-bottom: 18px; }
    .input-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; opacity: 0.5; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: #f4faf8;
      border: 1.5px solid #c8e8de;
      border-radius: 12px;
      color: #0f2d25;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus { border-color: #1a8060; background: #edfaf5; }
    input::placeholder { color: #a0c8b8; }

    .error-msg {
      background: rgba(232,68,26,0.07);
      border: 1px solid rgba(232,68,26,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      color: #c03010;
      font-size: 0.83rem;
      margin-bottom: 18px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e8441a, #c83010);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 6px;
      box-shadow: 0 4px 16px rgba(232,68,26,0.28);
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .hint { margin-top: 20px; text-align: center; font-size: 0.78rem; color: #7aaa90; }
    .hint strong { color: #1a8060; }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">🏛️</div>
      <div class="logo-text">SmartCampus<span>Resource Management System</span></div>
    </div>

    <h2>Admin Login</h2>
    <p class="subtitle">Sign in to access the analytics dashboard</p>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/">
      <label>Username</label>
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" name="username" placeholder="Enter username" required autocomplete="off"/>
      </div>

      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" name="password" placeholder="Enter password" required/>
      </div>

      <button type="submit">Sign In →</button>
    </form>

    <p class="hint">Demo credentials: <strong>admin</strong> / <strong>admin</strong></p>
  </div>
</body>
</html>
